name: Build Flutter APK

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub Actions tab
  push:
    branches: [ "main" ]
    paths:
      - 'flutter-composite-wall-app-v3/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: flutter-composite-wall-app-v3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate Android project (Fix Gradle issue)
        run: rm -rf android && flutter create --platforms=android .

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: composite-wall-app-apk
          path: flutter-composite-wall-app-v3/build/app/outputs/flutter-apk/app-release.apk
