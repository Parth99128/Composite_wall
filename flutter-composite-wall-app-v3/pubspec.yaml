name: composite_wall_cfd
description: Composite Wall CFD Temperature Distribution App - Pentas Insulations Pvt Ltd
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Charts & Visualization
  fl_chart: ^0.68.0
  syncfusion_flutter_gauges: ^26.2.11

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  pdf: ^3.10.8
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
